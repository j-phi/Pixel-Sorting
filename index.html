<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Pixel Sort Studio — A premium browser-based pixel sorting tool. Sort, glitch, and transform your images with edge-detection masks, directional sorting, polar warps, and more.">
    <title>Pixel Sort Studio</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js" defer></script>
</head>
<body>

<!-- ─── Sidebar ──────────────────────────────────────────────────────── -->
<aside id="sidebar">
    <div class="sidebar-logo">Pixel Sort Studio</div>

    <!-- Upload -->
    <div class="section-label">Image</div>
    <button class="btn btn-accent" id="upload-btn">Upload Image(s)</button>
    <input type="file" id="file-input" accept="image/*,.heic,.heif" multiple hidden>

    <div class="btn-row">
        <button class="btn" id="btn-prev">◀ Prev</button>
        <button class="btn" id="btn-next">Next ▶</button>
    </div>

    <div class="divider"></div>

    <!-- Threshold -->
    <div class="slider-wrap">
        <div class="slider-header">
            <span>Threshold</span>
            <span class="slider-val" id="threshold-val">60</span>
        </div>
        <input type="range" id="slider-threshold" min="0" max="255" value="60">
    </div>

    <div class="divider"></div>

    <!-- Sort Mode -->
    <div class="section-label">Sort By</div>
    <div class="radio-group" id="sort-modes">
        <button class="radio-btn active" data-val="0">Hue</button>
        <button class="radio-btn" data-val="1">Luma</button>
        <button class="radio-btn" data-val="2">Intensity</button>
    </div>

    <!-- Mask Mode -->
    <div class="section-label">Mask</div>
    <div class="radio-group" id="mask-modes">
        <button class="radio-btn active" data-val="sobel">Sobel</button>
        <button class="radio-btn" data-val="bright">Bright</button>
        <button class="radio-btn" data-val="dark">Dark</button>
    </div>

    <div class="divider"></div>

    <!-- Linear Sort -->
    <div class="section-label">Linear Sort</div>
    <button class="btn" id="btn-up">↑ Up</button>
    <div class="btn-row">
        <button class="btn" id="btn-left">← Left</button>
        <button class="btn" id="btn-right">Right →</button>
    </div>
    <button class="btn" id="btn-down">↓ Down</button>

    <!-- Diagonal Sort -->
    <div class="section-label">Diagonal Sort</div>
    <div class="btn-row">
        <button class="btn" id="btn-diag-up">⟋ Diag /</button>
        <button class="btn" id="btn-diag-down">⟍ Diag \</button>
    </div>

    <!-- Polar Sort -->
    <div class="section-label">Polar Sort</div>
    <div class="btn-row">
        <button class="btn" id="btn-circle">◎ Circle</button>
        <button class="btn" id="btn-burst">✦ Burst</button>
    </div>

    <div class="divider"></div>

    <!-- Effects -->
    <div class="section-label">Effects</div>
    <button class="btn" id="btn-blur">Blur (Mild)</button>
    <button class="btn" id="btn-noise">Noise (Mild)</button>
    <button class="btn" id="btn-rgb">RGB Shift</button>

    <div class="divider"></div>

    <!-- Macro -->
    <div class="section-label">Macro</div>
    <div class="btn-row">
        <button class="btn" id="btn-record">Record</button>
        <button class="btn" id="btn-play">Play</button>
    </div>

    <div class="divider"></div>

    <!-- History / Export -->
    <div class="section-label">History</div>
    <button class="btn" id="btn-undo">Undo</button>
    <button class="btn" id="btn-reset">Reset</button>

    <div class="divider"></div>

    <button class="btn btn-accent" id="btn-save">💾 Save Image</button>
</aside>

<!-- ─── Workspace ────────────────────────────────────────────────────── -->
<main id="workspace">
    <canvas id="main-canvas"></canvas>

    <!-- Placeholder -->
    <div id="upload-placeholder">
        <div class="icon">🖼</div>
        <p>Drag & drop images here<br>or click <strong>Upload</strong> in the sidebar</p>
    </div>

    <!-- Image Info -->
    <div id="image-info" class="hidden">
        <span class="filename" id="filename-display"></span>
        <span id="index-display"></span>
    </div>

    <!-- Status Bar -->
    <div id="status-bar">
        <span id="status-text">Ready</span>
        <span class="sep"></span>
        <span id="history-count">Undo: 0</span>
    </div>

    <!-- Loading -->
    <div id="loading-indicator" class="hidden">
        <div class="spinner"></div>
        Processing…
    </div>
</main>

<!-- ─── Drop Overlay ────────────────────────────────────────────────── -->
<div id="drop-overlay">
    <div class="drop-zone">
        <span>📂</span>
        Drop your images here
    </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
